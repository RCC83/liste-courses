<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- Cart body -->
  <path d="M128 152 L152 152 L192 320 L352 320 L384 208 L172 208"
        fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cart items lines (checklist feel) -->
  <line x1="220" y1="248" x2="340" y2="248" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
  <line x1="228" y1="282" x2="332" y2="282" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.4"/>

  <!-- Wheels -->
  <circle cx="210" cy="355" r="22" fill="white"/>
  <circle cx="335" cy="355" r="22" fill="white"/>

  <!-- Check badge -->
  <circle cx="370" cy="165" r="52" fill="#f0fdf4" opacity="0.95"/>
  <polyline points="348,165 363,182 394,150"
            fill="none" stroke="#16a34a" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
